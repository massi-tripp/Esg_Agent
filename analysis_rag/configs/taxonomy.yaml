version: "1.0"
last_updated: "2025-10-20"
language_support:
  - it
  - en
  - fr
  - de
  - es

categories:
  ENV:  "Environment (emissioni, energia, acqua, rifiuti)"
  SOC:  "Social (people, sicurezza, formazione, DEI)"
  GOV:  "Governance (board, etica, risk, privacy)"
  TARGET: "Obiettivi/commitment (net-zero, SBTi, % riduzione)"
  STANDARD: "Standard/Framework di rendicontazione"

defaults:
  number_locale: "eu"
  unit_canonical: "SI"
  confidence_scoring:
    regex_hit: 0.7
    synonym_hit: 0.5
    section_anchor: 0.3

section_anchors:
  ENV:
    - ["environment", "ambiente", "umwelt", "medio ambiente", "environnement"]
    - ["emissions", "emissioni", "emissionen", "emisiones", "émissions"]
    - ["energy", "energia", "energie", "energía", "énergie"]
    - ["water", "acqua", "wasser", "agua", "eau"]
    - ["waste", "rifiuti", "abfälle", "residuos", "déchets"]
  SOC:
    - ["people", "personale", "mitarbeitende", "empleados", "personnes"]
    - ["safety", "sicurezza", "arbeitssicherheit", "seguridad", "sécurité"]
    - ["training", "formazione", "schulung", "formación", "formation"]
    - ["diversity", "diversità", "vielfalt", "diversidad", "diversité"]
  GOV:
    - ["governance", "corporate governance", "unternehmensführung", "gobernanza", "gouvernance"]
    - ["board", "consiglio", "aufsichtsrat", "junta", "conseil"]
    - ["ethics", "etica", "ethik", "ética", "éthique"]
    - ["privacy", "data protection", "protezione dati", "datenschutz", "protección de datos", "protection des données"]
  TARGET:
    - ["target", "obiettivi", "ziele", "objetivos", "objectifs"]
    - ["net zero", "net-zero", "climate neutrality", "neutralità climatica", "klimaneutralität", "neutralidad climática", "neutralité climatique"]
    - ["SBTi", "science-based targets"]
  STANDARD:
    - ["GRI", "SASB", "TCFD", "CSRD", "ESRS", "UN SDGs", "UNGC", "CDP"]

labels:
  # ===== ENV KPI =====
  - id: env_scope1_total
    category: ENV
    description: "Emissioni Scope 1 totali"
    synonyms: ["scope 1", "emissioni dirette", "direct emissions", "scope i"]
    regex:
      - pattern: "(scope\\s*1)[^\\n\\r]*?(?:total|totali|gesamt)[^\\n\\r]*?([0-9][0-9\\.,\\s]*)(?:\\s*(t|tonnes|tons|kt|Mt|tCO2e|tCO₂e|ktCO2e|MtCO2e))?"
        flags: ["i", "m"]
    normalize:
      field: "scope1_total_tco2e"
      unit_in: ["t", "tonnes", "tons", "tCO2e", "tCO₂e", "kt", "Mt", "ktCO2e", "MtCO2e"]
      unit_out: "tCO2e"
      scale: { kt: 1000, Mt: 1000000, default: 1 }
      value_type: "float"

  - id: env_scope2_total_market
    category: ENV
    description: "Emissioni Scope 2 (market-based)"
    synonyms: ["scope 2 market", "market-based", "emissioni indirette da energia (market)"]
    regex:
      - pattern: "(scope\\s*2)[^\\n\\r]*?(market[- ]based)[^\\n\\r]*?([0-9][0-9\\.,\\s]*)(?:\\s*(t|tCO2e|kt|Mt))?"
        flags: ["i", "m"]
    normalize:
      field: "scope2_market_tco2e"
      unit_in: ["t", "tCO2e", "kt", "Mt"]
      unit_out: "tCO2e"
      scale: { kt: 1000, Mt: 1000000, default: 1 }
      value_type: "float"

  - id: env_energy_consumption_total
    category: ENV
    description: "Consumo energetico totale"
    synonyms: ["total energy consumption", "consumo energia", "energieverbrauch gesamt", "consumo energético total"]
    regex:
      - pattern: "(?:total\\s+energy\\s+consumption|consumo\\s+energetico\\s+totale|energieverbrauch\\s+gesamt)[^\\n\\r]*?([0-9][0-9\\.,\\s]*)(?:\\s*(kWh|MWh|GWh|TWh|TJ|GJ))"
        flags: ["i", "m"]
    normalize:
      field: "energy_total_mwh"
      unit_in: ["kWh","MWh","GWh","TWh","GJ","TJ"]
      unit_out: "MWh"
      scale: { kWh: 0.001, MWh: 1, GWh: 1000, TWh: 1000000, GJ: 0.2777778, TJ: 277.7778 }
      value_type: "float"

  - id: env_water_withdrawal
    category: ENV
    description: "Prelievi idrici totali"
    synonyms: ["water withdrawal", "prelievi d'acqua", "wasserentnahme", "captación de agua", "prélèvements d'eau"]
    regex:
      - pattern: "(water\\s+withdrawal|preliev[io] d.?acqua|wasserentnahme|captación de agua|prélèvements d'?eau)[^\\n\\r]*?([0-9][0-9\\.,\\s]*)(?:\\s*(m3|m³|Mm3|Mm³))"
        flags: ["i", "m"]
    normalize:
      field: "water_withdrawal_m3"
      unit_in: ["m3","m³","Mm3","Mm³"]
      unit_out: "m3"
      scale: { Mm3: 1000000, "Mm³": 1000000, m3: 1, "m³": 1 }
      value_type: "float"

  - id: env_waste_generated
    category: ENV
    description: "Rifiuti generati totali"
    synonyms: ["waste generated", "rifiuti generati", "abfälle gesamt", "residuos generados"]
    regex:
      - pattern: "(waste\\s+generated|rifiuti\\s+generati|abfälle\\s+gesamt|residuos\\s+generados)[^\\n\\r]*?([0-9][0-9\\.,\\s]*)(?:\\s*(t|tonnes|tons|kt|Mt))"
        flags: ["i", "m"]
    normalize:
      field: "waste_total_t"
      unit_in: ["t","tonnes","tons","kt","Mt"]
      unit_out: "t"
      scale: { kt: 1000, Mt: 1000000, t: 1, tonnes: 1, tons: 0.907185 }

  # ===== SOC KPI =====
  - id: soc_trir
    category: SOC
    description: "Total Recordable Injury Rate (TRIR)"
    synonyms: ["TRIR", "infortuni registrabili totali", "unfallrate", "índice de lesiones", "taux de fréquence des accidents"]
    regex:
      - pattern: "(TRIR|total\\s+recordable\\s+injury\\s+rate)[^\\n\\r]*?([0-9]+[\\.,]?[0-9]*)"
        flags: ["i", "m"]
    normalize:
      field: "trir"
      unit_out: "per_200k_hours"
      value_type: "float"

  - id: soc_training_hours_per_employee
    category: SOC
    description: "Ore di formazione per dipendente"
    synonyms: ["training hours per employee", "ore di formazione per dipendente", "schulungsstunden pro mitarbeiter"]
    regex:
      - pattern: "(training\\s+hours\\s+per\\s+employee|ore\\s+di\\s+formazione\\s+per\\s+dipendente)[^\\n\\r]*?([0-9]+[\\.,]?[0-9]*)"
        flags: ["i", "m"]
    normalize:
      field: "training_hours_per_employee"
      value_type: "float"

  - id: soc_female_leadership_ratio
    category: SOC
    description: "% donne in posizioni di leadership"
    synonyms: ["women in leadership", "donne in leadership", "frauen in führungspositionen", "mujeres en liderazgo"]
    regex:
      - pattern: "(women|donne|frauen|mujeres)[^\\n\\r]{0,50}(leadership|management|dirigenza)[^\\n\\r]*?([0-9]+[\\.,]?[0-9]*)\\s*%"
        flags: ["i", "m"]
    normalize:
      field: "female_leadership_pct"
      value_type: "percent"

  # ===== GOV KPI =====
  - id: gov_board_independence_ratio
    category: GOV
    description: "% indipendenti nel consiglio di amministrazione"
    synonyms: ["independent directors", "consiglieri indipendenti", "unabhängige aufsichtsräte", "conseillers indépendants"]
    regex:
      - pattern: "(independent\\s+directors|consiglieri\\s+indipendenti|unabh[aä]ngige)[^\\n\\r]*?([0-9]+[\\.,]?[0-9]*)\\s*%"
        flags: ["i", "m"]
    normalize:
      field: "board_independence_pct"
      value_type: "percent"

  - id: gov_anti_corruption_training_coverage
    category: GOV
    description: "% dipendenti formati su anticorruzione"
    synonyms: ["anti-corruption training coverage", "formazione anticorruzione", "schulung korruptionsprävention"]
    regex:
      - pattern: "(anti[- ]?corruption)[^\\n\\r]*?(training|formazione|schulung)[^\\n\\r]*?([0-9]+[\\.,]?[0-9]*)\\s*%"
        flags: ["i", "m"]
    normalize:
      field: "anti_corruption_training_pct"
      value_type: "percent"

  - id: gov_data_privacy_incidents
    category: GOV
    description: "Numero incidenti privacy"
    synonyms: ["data privacy incidents", "incidenti privacy", "datenschutzvorfälle", "incidentes de privacidad"]
    regex:
      - pattern: "(privacy|data\\s+protection|datenschutz)[^\\n\\r]*?(incidents?|incidenti|vorf[aä]lle)[^\\n\\r]*?([0-9]+)"
        flags: ["i", "m"]
    normalize:
      field: "privacy_incidents_count"
      value_type: "int"

  # ===== TARGET =====
  - id: target_net_zero_year
    category: TARGET
    description: "Anno target net-zero"
    synonyms: ["net zero", "climate neutrality", "neutralità climatica", "klimaneutral"]
    regex:
      - pattern: "(net[- ]?zero|climate\\s+neutral\\w*|neutralit[aà]\\s+climatic\\w*|klimaneutral\\w*)[^\\n\\r]*?(by|entro|bis|para|d'ici)\\s*(20[2-5][0-9])"
        flags: ["i", "m"]
    normalize:
      field: "net_zero_target_year"
      value_type: "int"

  - id: target_emissions_reduction_pct
    category: TARGET
    description: "% riduzione emissioni (baseline→target)"
    synonyms: ["emissions reduction", "riduzione emissioni", "emissionsminderung", "reducción de emisiones"]
    regex:
      - pattern: "(emissions?)[^\\n\\r]{0,40}(reduction|riduzione|minderung|reducci[oó]n)[^\\n\\r]*?([0-9]+[\\.,]?[0-9]*)\\s*%[^\\n\\r]*?(?:by|entro|bis|para|d'ici)\\s*(20[2-5][0-9])"
        flags: ["i", "m"]
    normalize:
      field: "emissions_reduction_target_pct_year"
      value_type: "object"   # {pct, year}

  - id: target_sbti_status
    category: TARGET
    description: "Stato validazione SBTi (committed/approved)"
    synonyms: ["SBTi", "science-based targets initiative"]
    regex:
      - pattern: "sbti[^\\n\\r]{0,40}(approved|committed|validated|confermato|aprobado|genehmigt)"
        flags: ["i", "m"]
    normalize:
      field: "sbti_status"
      value_type: "enum"
      enum: ["approved", "committed", "validated"]

  # ===== STANDARD =====
  - id: std_gri
    category: STANDARD
    description: "Dichiarazione conformità GRI"
    synonyms: ["GRI", "Global Reporting Initiative"]
    regex:
      - pattern: "gri(?:\\s+standards)?[^\\n\\r]{0,40}(in\\s*accordance|in\\s*conformit[aà]|aligned|gem[aä]ß|de conformidad|conforme)"
        flags: ["i", "m"]
    normalize:
      field: "gri_claim"
      value_type: "bool"

  - id: std_tcfd
    category: STANDARD
    description: "Aderenza raccomandazioni TCFD"
    synonyms: ["TCFD", "Task Force on Climate-related Financial Disclosures"]
    regex:
      - pattern: "tcfd[^\\n\\r]{0,60}(recommendations?|raccomandazioni|empfehlungen|recomendaciones)"
        flags: ["i", "m"]
    normalize:
      field: "tcfd_claim"
      value_type: "bool"

  - id: std_csrd_esrs
    category: STANDARD
    description: "Ambito CSRD/ESRS dichiarato"
    synonyms: ["CSRD", "ESRS"]
    regex:
      - pattern: "csrd|esrs"
        flags: ["i"]
    normalize:
      field: "csrd_esrs_mentioned"
      value_type: "bool"

  # ===== ENV ACTIVITIES =====
  - id: act_env_renewable_energy
    category: ENV
    description: "Adozione/produzione di energia rinnovabile"
    synonyms: ["renewable energy", "energia rinnovabile", "erneuerbare energie", "energía renovable", "énergie renouvelable", "ppa", "power purchase agreement", "fotovoltaico", "eolico"]
  - id: act_env_energy_efficiency
    category: ENV
    description: "Programmi di efficienza energetica"
    synonyms: ["energy efficiency", "efficienza energetica", "energieeffizienz", "eficiencia energética", "iso 50001", "retrofit", "heat recovery", "waste heat"]
  - id: act_env_emission_reduction_programs
    category: ENV
    description: "Programmi di riduzione emissioni (operativi/procurement)"
    synonyms: ["emissions reduction program", "riduzione emissioni", "low-carbon", "abated", "decarbonization", "decarbonizzazione", "carbon capture", "ccs", "ccus"]

  # ===== SOC ACTIVITIES =====
  - id: act_soc_training_programs
    category: SOC
    description: "Programmi di formazione"
    synonyms: ["training program", "programma di formazione", "schulungsprogramm", "learning & development", "academy", "reskilling", "upskilling"]
  - id: act_soc_health_safety_programs
    category: SOC
    description: "Salute e sicurezza sul lavoro"
    synonyms: ["health and safety", "sicurezza sul lavoro", "arbeitssicherheit", "osha", "zero harm", "near-miss reporting", "behavioral safety"]
  - id: act_soc_diversity_inclusion
    category: SOC
    description: "Iniziative DEI (diversity/equity/inclusion)"
    synonyms: ["diversity and inclusion", "diversità e inclusione", "dei", "inclusione", "erg", "employee resource group", "equal pay", "gender pay gap"]

  # ===== GOV ACTIVITIES =====
  - id: act_gov_ethics_code_compliance
    category: GOV
    description: "Codice etico, compliance e anticorruzione"
    synonyms: ["code of ethics", "codice etico", "compliance program", "anticorruption policy", "whistleblowing", "speak up", "due diligence", "supplier code"]
  - id: act_gov_privacy_security
    category: GOV
    description: "Gestione privacy e cybersecurity"
    synonyms: ["privacy program", "data protection", "gdpr", "cybersecurity", "information security", "iso 27001", "dpo", "data breach response"]
  - id: act_gov_risk_management
    category: GOV
    description: "Enterprise risk management"
    synonyms: ["enterprise risk management", "erm", "gestione dei rischi", "risk appetite", "risk register", "internal control system", "ics"]
